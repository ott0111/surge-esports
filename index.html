<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Surge Esports</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#050505;
  --card:#0c0c0c;
  --line:#1a1a1a;
  --gold:#f5b800;
  --text:#fff;
  --muted:#9a9a9a;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* FUN START SCREEN */
#fun{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  background:#050505;
  z-index:10000;
  cursor:pointer;
}
.fun-text{
  font-family:'Bebas Neue';
  font-size:2rem;
  letter-spacing:.2em;
}
.fun-sub{
  margin-top:1rem;
  font-size:.7rem;
  letter-spacing:.3em;
  color:var(--muted);
  animation:blink 1.5s infinite;
}

/* LOADING */
#loader{
  position:fixed;inset:0;
  background:#050505;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
  opacity:0;pointer-events:none;
}
#loader.active{opacity:1;pointer-events:auto;}

.loader-bar{
  width:220px;height:2px;
  background:var(--line);
  margin-top:1.5rem;
  overflow:hidden;
}
.loader-fill{
  height:100%;
  width:0%;
  background:var(--gold);
  transition:width .3s;
}
.loader-text{
  font-size:.7rem;
  letter-spacing:.3em;
  color:var(--muted);
}

/* ENTER SCREEN */
#intro{
  position:fixed;inset:0;
  background:#050505;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  z-index:9998;
  opacity:0;pointer-events:none;
}
#intro.active{
  opacity:1;pointer-events:auto;
}
#intro.hide{
  opacity:0;pointer-events:none;
  transition:.8s;
}

.intro-logo{
  width:100px;
  animation:pulse 2s infinite;
}
.intro-title{
  font-family:'Bebas Neue';
  letter-spacing:.2em;
  margin-top:1rem;
}
.intro-enter{
  margin-top:2rem;
  font-size:.7rem;
  letter-spacing:.3em;
  color:var(--muted);
  animation:blink 1.5s infinite;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:1.2rem 6%;
  z-index:100;
  backdrop-filter:blur(10px);
}
nav.scrolled{
  background:rgba(5,5,5,.7);
  border-bottom:1px solid var(--line);
}

.logo{
  font-family:'Bebas Neue';
  font-size:1.7rem;
}
.logo span{color:var(--gold);}

.nav-links{
  display:flex;gap:2rem;
}
.nav-links a{
  color:var(--muted);
  text-decoration:none;
  font-size:.75rem;
  letter-spacing:.2em;
}
.nav-links a:hover{color:white;}

.nav-btn{
  border:1px solid var(--line);
  padding:.6rem 1.5rem;
  font-size:.7rem;
}
.nav-btn:hover{
  border-color:var(--gold);
  color:var(--gold);
}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 6%;
}
.hero-title{
  font-family:'Bebas Neue';
  font-size:clamp(5rem,10vw,9rem);
}
.hero-title span{
  color:var(--gold);
  text-shadow:0 0 20px rgba(245,184,0,.4);
}
.hero-text{
  margin:1.5rem 0 2rem;
  color:var(--muted);
}

/* BUTTON */
.btn{
  padding:1rem 2rem;
  font-size:.7rem;
  letter-spacing:.2em;
  text-decoration:none;
  transition:.3s;
}
.primary{
  background:var(--gold);
  color:black;
}
.primary:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(245,184,0,.3);
}

/* SECTION */
.section{
  padding:7rem 6%;
  border-top:1px solid var(--line);
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:1.5rem;
  margin-top:1rem;
  transition:.3s;
}
.card:hover{
  border-color:var(--gold);
  transform:translateY(-5px);
}

/* FOOTER */
footer{
  padding:2rem;
  text-align:center;
  color:var(--muted);
}

/* ANIM */
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:.3;}
}
</style>
</head>

<body>

<!-- FUN -->
<div id="fun">
  <div class="fun-text">SURGE SYSTEM</div>
  <div class="fun-sub">CLICK TO BOOT</div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-text">LOADING SYSTEM</div>
  <div class="loader-bar"><div class="loader-fill" id="fill"></div></div>
</div>

<!-- ENTER -->
<div id="intro">
  <img src="IMG_1527.gif" class="intro-logo">
  <div class="intro-title">SURGE ESPORTS</div>
  <div class="intro-enter">PRESS ENTER</div>
</div>

<!-- NAV -->
<nav id="nav">
  <div class="logo">SURGE <span>ESPORTS</span></div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#news">News</a>
  </div>
  <a href="https://discord.gg/2gaCcjDcqa" class="nav-btn">DISCORD</a>
</nav>

<!-- HERO -->
<section id="hero">
  <div>
    <h1 class="hero-title">WE <span>SURGE</span></h1>
    <p class="hero-text">Competitive Fortnite org built to win.</p>
    <a href="https://discord.gg/2gaCcjDcqa" class="btn primary">JOIN</a>
  </div>
</section>

<section id="about" class="section">
  <h2>ABOUT</h2>
  <div class="card">⚡ Hunger</div>
  <div class="card">🔥 Growth</div>
</section>

<footer>© 2026 Surge Esports</footer>

<script>
// FLOW
const fun = document.getElementById("fun");
const loader = document.getElementById("loader");
const intro = document.getElementById("intro");
const fill = document.getElementById("fill");

// STEP 1 → CLICK
fun.onclick = () => {
  fun.style.display="none";
  loader.classList.add("active");

  let progress = 0;
  let interval = setInterval(()=>{
    progress+=10;
    fill.style.width = progress+"%";

    if(progress>=100){
      clearInterval(interval);
      loader.style.display="none";
      intro.classList.add("active");
    }
  },150);
};

// STEP 3 → ENTER
document.addEventListener("keydown", e=>{
  if(e.key==="Enter") intro.classList.add("hide");
});
intro.onclick = ()=> intro.classList.add("hide");

// NAV
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>50);
});
</script>

</body>
</html>
