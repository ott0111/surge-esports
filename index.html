<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Surge Esports</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#050505;
  --card:#0d0d0d;
  --line:#1a1a1a;
  --gold:#f5b800;
  --text:#ffffff;
  --muted:#8a8a8a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:#050505;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  text-align:center;
}

#intro.hide{
  opacity:0;
  pointer-events:none;
  transition:.8s;
}

.intro-logo{
  width:100px;
  margin-bottom:1rem;
  animation:pulse 2s infinite;
}

.intro-title{
  font-family:'Bebas Neue';
  font-size:2rem;
  letter-spacing:.15em;
}

.intro-enter{
  margin-top:2rem;
  font-size:.7rem;
  letter-spacing:.3em;
  color:var(--muted);
  animation:blink 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:.3;}
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.2rem 5%;
  z-index:100;
  transition:.3s;
}
nav.scrolled{
  background:rgba(5,5,5,.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}

.logo{
  font-family:'Bebas Neue';
  font-size:1.6rem;
}
.logo span{color:var(--gold);}

.nav-links{
  display:flex;
  gap:2rem;
}
.nav-links a{
  text-decoration:none;
  color:var(--muted);
  font-size:.8rem;
}
.nav-links a:hover{color:var(--text);}

.nav-btn{
  border:1px solid var(--line);
  padding:.5rem 1.3rem;
  text-decoration:none;
  font-size:.75rem;
}
.nav-btn:hover{
  border-color:var(--gold);
  color:var(--gold);
}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 5%;
}

.hero-title{
  font-family:'Bebas Neue';
  font-size:clamp(4rem,9vw,8rem);
}
.hero-title span{color:var(--gold);}

.hero-text{
  margin:1rem 0 2rem;
  color:var(--muted);
}

.btn{
  padding:1rem 2rem;
  text-decoration:none;
  font-size:.75rem;
}
.primary{background:var(--gold);color:black;}
.secondary{border:1px solid var(--line);color:white;}

/* SECTION */
.section{
  padding:6rem 5%;
  border-top:1px solid var(--line);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:1.5rem;
  margin-top:1rem;
}

/* FOOTER */
footer{
  padding:2rem;
  text-align:center;
  border-top:1px solid var(--line);
  color:var(--muted);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="IMG_1527.gif" class="intro-logo">
  <div class="intro-title">SURGE ESPORTS</div>
  <div class="intro-enter">PRESS ENTER</div>
</div>

<!-- SITE -->
<nav id="nav">
  <div class="logo">SURGE <span>ESPORTS</span></div>

  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#news">News</a>
    <a href="#join">Join</a>
  </div>

  <a href="https://discord.gg/2gaCcjDcqa" class="nav-btn">DISCORD</a>
</nav>

<section id="hero">
  <div>
    <h1 class="hero-title">WE <span>SURGE</span></h1>
    <p class="hero-text">Competitive Fortnite organization built to win.</p>
    <a href="https://discord.gg/2gaCcjDcqa" class="btn primary">JOIN</a>
  </div>
</section>

<section id="about" class="section">
  <h2>ABOUT</h2>
  <div class="card">⚡ Hunger</div>
  <div class="card">🔥 Growth</div>
</section>

<section id="news" class="section">
  <h2>NEWS</h2>
  <div class="card">Surge launches</div>
</section>

<section id="join" class="section">
  <h2>JOIN</h2>
  <a href="https://discord.gg/2gaCcjDcqa" class="btn primary">JOIN DISCORD</a>
</section>

<footer>
© 2026 Surge Esports
</footer>

<script>
// PRESS ENTER INTRO
const intro = document.getElementById("intro");

function enterSite(){
  intro.classList.add("hide");
}

document.addEventListener("keydown", e=>{
  if(e.key === "Enter") enterSite();
});

intro.addEventListener("click", enterSite);

// NAV SCROLL
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>50);
});
</script>

</body>
</html>
